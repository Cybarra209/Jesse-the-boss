<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Battle of Jesse the Jerk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="characterSelect">
<h1>Choose Your Spaceship</h1>
<div class="ships">
<img src="assets/ship1.png" class="shipChoice" data-ship="1">
<img src="assets/ship2.png" class="shipChoice" data-ship="2">
<img src="assets/ship3.png" class="shipChoice" data-ship="3">
</div>
</div>

<div id="loadingScreen">
<h1>⚠ WARNING ⚠</h1>
<h2>Entering the Battle of Jesse the Jerk</h2>
<div class="loadingBar"><div id="loadingFill"></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="victoryScreen">
<h1>🎉 CONGRATULATIONS 🎉</h1>
<h2>You Defeated Jesse the Jerk!</h2>
</div>

<div id="controls">
<button id="leftBtn">◀</button>
<button id="fireBtn">🔥</button>
<button id="rightBtn">▶</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="game.js"></script>
</body>
</html>
